<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card Prototype</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Delius&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Chango&family=Delius&display=swap" rel="stylesheet">
</head>
<body>
 <div id="loginForm">
        <form id="passwordForm">
            <input type="password" id="passwordInput" placeholder="Enter Password" required>
            <br>
            <button type="button" onclick="validatePassword()"> access </button>
        </form>
        <div id="errorMsg" class="error"></div>
    </div>
<div id="container">
    <div class="card-outer-body">
        <div class="card-inner-body">
            <div class="left-wrapper">
                <img src="./assets/dante.png" alt="dante chan" class= "dante-img">
                <p id="left-caption"> LOVE YOU LOTS, FREYACHAN!! </p>
            </div>
            <div class="right-wrapper">
                <h1 class="birthday-label">Happy Birthday!</h1>
                <div>
                    <div class="heart-message-wrapper">
                        <img src="./assets/lace_heart.PNG" alt="heart message" class= "heart-message-image">
                        <p class="heart-message-text"> happy birthday pookie bear thank u for being my friend! xoxoxo </p>
                    </div>
                </div>
                <div>
                        <div class="code-container">
                            <p class="code-label">
                                Scratch me!
                            </p>
                            <div class="scratch-container">
                                <div class="scratch-card">
                                    <div class="code">CLIP STUDIO CODE: D7DF9CFF0C</div>
                                </div>
                                <canvas id="scratch-card1" width="300" height="100"></canvas>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="./main.js"></script>
<script src="./scratch_code.js"></script>
</body>
</html>
